<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FESTV — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #C4A06A;
      --gold-light: #D9BF8C;
      --gold-dark: #9C7A45;
      --bg: #F5F3EF;
      --white: #FFFFFF;
      --dark: #1A1714;
      --charcoal: #3A3530;
      --muted: #7A7068;
      --border: rgba(0,0,0,0.09);
      --red: #B84040;
      --green: #3A8A55;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.75rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--dark);
      text-decoration: none;
    }
    .logo .v { color: var(--gold); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 5rem;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
    }

    /* ── HEADING ── */
    .heading {
      text-align: center;
      margin-bottom: 2.25rem;
    }
    .heading-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.55rem;
    }
    .heading-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 500;
      color: var(--dark);
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .heading-sub {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2rem 1.75rem;
    }

    /* ── FORM ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.42rem;
      margin-bottom: 1.25rem;
    }
    .form-label {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--charcoal);
    }
    .form-input {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.84rem;
      color: var(--dark);
      background: var(--bg);
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(196,160,106,0.12);
    }
    .form-input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(184,64,64,0.08);
    }
    .form-input::placeholder { color: #B8B0A6; }

    /* ── ERROR MSG ── */
    .error-msg {
      display: none;
      font-size: 0.72rem;
      color: var(--red);
      margin-top: 0.3rem;
    }
    .error-msg.show { display: block; }

    /* ── SUBMIT BUTTON ── */
    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: var(--dark);
      color: var(--gold-light);
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      min-height: 48px;
    }
    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.6; cursor: default; }

    /* spinner */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(217,191,140,0.35);
      border-top-color: var(--gold-light);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SUCCESS STATE ── */
    .success-state {
      display: none;
      text-align: center;
      padding: 1rem 0 0.5rem;
    }
    .success-state.show { display: block; }
    .success-icon {
      width: 52px;
      height: 52px;
      background: rgba(58,138,85,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .success-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--green);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 0.5rem;
    }
    .success-text {
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.65;
    }
    .success-email {
      font-weight: 600;
      color: var(--charcoal);
    }

    /* ── FOOTER LINKS ── */
    .footer-links {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold-dark); }
    .back-link svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .resend-row {
      display: none;
      text-align: center;
      margin-top: 1.25rem;
    }
    .resend-row.show { display: block; }
    .resend-link {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .resend-link button {
      background: none;
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--gold-dark);
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }
    .resend-link button:hover { color: var(--gold); }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      header {
        padding: 1.25rem 1.25rem;
      }

      .logo {
        font-size: 1.7rem;
      }

      main {
        padding: 2rem 1rem 3rem;
        align-items: flex-start;
      }

      .wrap {
        max-width: 100%;
      }

      .heading-title {
        font-size: 2rem;
      }

      .card {
        padding: 1.5rem 1.25rem 1.25rem;
      }
    }

    @media (max-width: 480px) {
      .heading-title {
        font-size: 1.7rem;
      }
    }

  </style>
</head>
<body>

  <header>
    <a class="logo" href="/signin.html">FEST<span class="v">V</span></a>
  </header>

  <main>
    <div class="wrap">

      <!-- Heading -->
      <div class="heading">
        <div class="heading-label">Password Reset</div>
        <div class="heading-title">Forgot your password?</div>
        <div class="heading-sub">Enter your email and we'll send you a link to reset your password.</div>
      </div>

      <!-- Card -->
      <div class="card">

        <!-- Form state -->
        <div id="formState">
          <div class="form-group">
            <label class="form-label" for="emailInput">Email Address</label>
            <input class="form-input" id="emailInput" type="email" placeholder="you@email.com" autocomplete="email">
            <div class="error-msg" id="errorMsg">Please enter a valid email address.</div>
          </div>

          <button class="btn-submit" id="btnSubmit">
            <span class="btn-text">Send Reset Link</span>
            <div class="spinner"></div>
          </button>
        </div>

        <!-- Success state -->
        <div class="success-state" id="successState">
          <div class="success-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="success-title">Check your inbox</div>
          <div class="success-text">
            We sent a reset link to <span class="success-email" id="successEmail"></span>.<br>
            It may take a minute or two to arrive.
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="footer-links">
        <a class="back-link" href="/signin.html">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Sign In
        </a>
      </div>

      <div class="resend-row" id="resendRow">
        <span class="resend-link">Didn't get it? <button id="btnResend">Resend email</button></span>
      </div>

    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {

      const emailInput  = document.getElementById('emailInput');
      const btnSubmit   = document.getElementById('btnSubmit');
      const errorMsg    = document.getElementById('errorMsg');
      const formState   = document.getElementById('formState');
      const successState = document.getElementById('successState');
      const successEmail = document.getElementById('successEmail');
      const resendRow   = document.getElementById('resendRow');
      const btnResend   = document.getElementById('btnResend');

      emailInput.addEventListener('input', function () {
        emailInput.classList.remove('error');
        errorMsg.classList.remove('show');
      });

      btnSubmit.addEventListener('click', function () {
        const val = emailInput.value.trim();
        const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);

        if (!valid) {
          emailInput.classList.add('error');
          errorMsg.classList.add('show');
          emailInput.focus();
          return;
        }

        btnSubmit.classList.add('loading');
        btnSubmit.disabled = true;

        function showSuccess(email) {
          btnSubmit.classList.remove('loading');
          formState.style.display = 'none';
          successEmail.textContent = email;
          successState.classList.add('show');
          resendRow.classList.add('show');
        }

        fetch('/api/v1/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: val })
        })
        .then(function(r) { return r.json(); })
        .then(function() { showSuccess(val); })
        .catch(function() { showSuccess(val); }); // Always show success for security
      });

      btnResend.addEventListener('click', function () {
        var email = successEmail.textContent;
        btnResend.textContent = 'Sending…';
        btnResend.disabled = true;
        fetch('/api/v1/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        })
        .then(function() {})
        .catch(function() {})
        .finally(function() {
          btnResend.textContent = 'Sent ✓';
          setTimeout(function () {
            btnResend.textContent = 'Resend email';
            btnResend.disabled = false;
          }, 4000);
        });
      });

      emailInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') btnSubmit.click();
      });

    });
  </script>

</body>
</html>
