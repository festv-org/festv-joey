# Render Blueprint - Auto-configures all services
# Deploy by clicking "New" > "Blueprint" on Render and connecting your repo

databases:
  - name: caterease-db
    plan: free
    databaseName: caterease
    user: caterease

services:
  # Full-stack service — API + FESTV frontend
  - type: web
    name: caterease-api
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: cd ../frontend && npm install && npm run build && cd ../backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: caterease-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
